<script>
        let isRunning = false;
        let currentPattern = 'box';
        let state = 'inhale';
        let cycle = 0;
        let timer = null;
        let animationFrameId = null;
        let phaseStartTime = 0;
        let phaseDuration = 0;

        const patterns = {
            box: { inhale: 4, hold1: 4, exhale: 4, hold2: 4, label: "Box Breathing", desc: "Equal parts for calm and focus." },
            '478': { inhale: 4, hold1: 7, exhale: 8, hold2: 0, label: "4-7-8 Technique", desc: "Powerful for relaxation and sleep." },
            resonant: { inhale: 5, hold1: 0, exhale: 5, hold2: 0, label: "Resonant", desc: "Optimizes heart rate variability." }
        };

        const particleContainer = document.getElementById('particle-container');
        const inhaleSpheres = [
            document.getElementById('inhale-1'),
            document.getElementById('inhale-2'),
            document.getElementById('inhale-3'),
            document.getElementById('inhale-4')
        ];
        const exhaleSpheres = [
            document.getElementById('exhale-1'),
            document.getElementById('exhale-2'),
            document.getElementById('exhale-3'),
            document.getElementById('exhale-4')
        ];
        const topSphere = document.getElementById('top-sphere');
        const topMist = document.getElementById('top-mist');
        
        const motes = [];
        const NUM_MOTES = 120;

        function initMotes() {
            particleContainer.innerHTML = '';
            motes.length = 0;
            for(let i=0; i<NUM_MOTES; i++) {
                const mote = document.createElement('div');
                mote.className = 'mote red';
                const size = Math.random() * 3 + 2;
                mote.style.width = size + 'px';
                mote.style.height = size + 'px';
                
                // Start hidden or at initial pos
                mote.style.opacity = '0';
                
                particleContainer.appendChild(mote);
                motes.push({
                    el: mote,
                    x: 0,
                    y: 0,
                    baseOffsetX: (Math.random() - 0.5) * 30, // For swirling inside spheres
                    baseOffsetY: (Math.random() - 0.5) * 30,
                    speed: Math.random() * 0.5 + 0.5,
                    angle: Math.random() * Math.PI * 2,
                    visible: false
                });
            }
        }

        function getSphereCenter(element) {
            if (!element) return { x: 50, y: 50 };
            const containerRect = document.getElementById('viz-container').getBoundingClientRect();
            const rect = element.getBoundingClientRect();
            
            return {
                x: ((rect.left + rect.width / 2) - containerRect.left) / containerRect.width * 100,
                y: ((rect.top + rect.height / 2) - containerRect.top) / containerRect.height * 100
            };
        }

        function updateAnimation() {
            if (!isRunning) return;
            
            const now = Date.now();
            const elapsed = (now - phaseStartTime) / 1000;
            let progress = Math.min(elapsed / phaseDuration, 1);
            if (phaseDuration === 0) progress = 1;

            // Reset sphere highlights
            inhaleSpheres.forEach(s => s.classList.remove('active-sphere'));
            exhaleSpheres.forEach(s => s.classList.remove('active-sphere-right'));
            topSphere.classList.remove('active-sphere-top');
            topMist.style.opacity = '0';

            let targetPath = [];
            let particleState = 'hidden';
            let particleColor = 'red';

            if (state === 'inhale') {
                particleColor = 'red';
                // Activate spheres based on progress
                const activeIndex = Math.floor(progress * 4);
                if (activeIndex < 4) {
                    inhaleSpheres[activeIndex].classList.add('active-sphere');
                }
                
                // Particles move up left side
                targetPath = [
                    { x: 15, y: 90 }, // bottom
                    getSphereCenter(inhaleSpheres[0]),
                    getSphereCenter(inhaleSpheres[1]),
                    getSphereCenter(inhaleSpheres[2]),
                    getSphereCenter(inhaleSpheres[3]),
                    { x: 25, y: 25 }, // curve start
                    getSphereCenter(topSphere)
                ];
                particleState = 'flowing';

            } else if (state === 'hold1') {
                particleColor = 'purple';
                topSphere.classList.add('active-sphere-top');
                topMist.style.opacity = '0.4';
                topMist.classList.add('bg-purple-500/20');
                particleState = 'swirling_top';

            } else if (state === 'exhale') {
                particleColor = 'blue';
                // Activate spheres based on progress
                const activeIndex = Math.floor(progress * 4);
                if (activeIndex < 4) {
                    exhaleSpheres[activeIndex].classList.add('active-sphere-right');
                }
                
                // Particles move down right side
                targetPath = [
                    getSphereCenter(topSphere),
                    { x: 75, y: 25 }, // curve end
                    getSphereCenter(exhaleSpheres[0]),
                    getSphereCenter(exhaleSpheres[1]),
                    getSphereCenter(exhaleSpheres[2]),
                    getSphereCenter(exhaleSpheres[3]),
                    { x: 85, y: 90 } // bottom
                ];
                particleState = 'flowing';

            } else if (state === 'hold2') {
                // Hidden/resting at bottom
                particleState = 'hidden';
            }

            motes.forEach((m, i) => {
                // Stagger particles slightly
                const mProgress = Math.max(0, Math.min(1, progress + (i / NUM_MOTES) * 0.2 - 0.1));
                
                m.el.classList.remove('red', 'blue', 'purple');
                m.el.classList.add(particleColor);

                if (particleState === 'flowing' && targetPath.length > 0) {
                    m.el.style.opacity = mProgress > 0 && mProgress < 1 ? '1' : '0';
                    
                    // Simple path interpolation
                    const pathLen = targetPath.length - 1;
                    const pathIdx = Math.floor(mProgress * pathLen);
                    const pathPct = (mProgress * pathLen) - pathIdx;
                    
                    if (pathIdx < pathLen) {
                        const p1 = targetPath[pathIdx];
                        const p2 = targetPath[pathIdx + 1];
                        
                        // Add some noise to the path
                        const noiseX = Math.sin(now/200 + i) * 2;
                        const noiseY = Math.cos(now/200 + i) * 2;

                        const currX = p1.x + (p2.x - p1.x) * pathPct + noiseX;
                        const currY = p1.y + (p2.y - p1.y) * pathPct + noiseY;

                        m.el.style.left = currX + '%';
                        m.el.style.top = currY + '%';
                    }
                } else if (particleState === 'swirling_top') {
                    m.el.style.opacity = '1';
                    const center = getSphereCenter(topSphere);
                    
                    // Swirl logic
                    m.angle += 0.05 * m.speed;
                    const radius = 15 + Math.sin(now/500 + i) * 5; // dynamic radius
                    
                    const currX = center.x + Math.cos(m.angle) * radius * (100 / window.innerWidth); // rough aspect ratio adj
                    const currY = center.y + Math.sin(m.angle) * radius * (100 / 400);

                    m.el.style.left = currX + '%';
                    m.el.style.top = currY + '%';
                } else {
                    m.el.style.opacity = '0';
                }
            });

            animationFrameId = requestAnimationFrame(updateAnimation);
        }

        function setPattern(id) {
            currentPattern = id;
            document.querySelectorAll('.pattern-btn').forEach(btn => {
                if(btn.dataset.pattern === id) {
                    btn.classList.add('bg-primary-container/30', 'text-primary');
                    btn.classList.remove('text-on-surface-variant');
                } else {
                    btn.classList.remove('bg-primary-container/30', 'text-primary');
                    btn.classList.add('text-on-surface-variant');
                }
            });
            document.getElementById('pattern-desc').innerText = patterns[id].desc;
            resetSession();
        }

        function toggleBreathing() {
            isRunning = !isRunning;
            const btn = document.getElementById('start-btn');
            const icon = document.getElementById('btn-icon');
            
            if (isRunning) {
                btn.classList.replace('bg-primary', 'bg-tertiary');
                icon.innerText = 'pause';
                startCycle();
                updateAnimation();
            } else {
                btn.classList.replace('bg-tertiary', 'bg-primary');
                icon.innerText = 'play_arrow';
                clearTimeout(timer);
                cancelAnimationFrame(animationFrameId);
                document.getElementById('breathing-state').innerText = "Paused";
                
                // Cleanup visuals
                inhaleSpheres.forEach(s => s.classList.remove('active-sphere'));
                exhaleSpheres.forEach(s => s.classList.remove('active-sphere-right'));
                topSphere.classList.remove('active-sphere-top');
                topMist.style.opacity = '0';
                motes.forEach(m => m.el.style.opacity = '0');
            }
        }

        function resetSession() {
            isRunning = false;
            state = 'inhale';
            cycle = 0;
            document.getElementById('cycle-count').innerText = "0";
            document.getElementById('breathing-state').innerText = "Ready";
            const btn = document.getElementById('start-btn');
            btn.classList.replace('bg-tertiary', 'bg-primary');
            document.getElementById('btn-icon').innerText = 'play_arrow';
            clearTimeout(timer);
            cancelAnimationFrame(animationFrameId);
            
            inhaleSpheres.forEach(s => s.classList.remove('active-sphere'));
            exhaleSpheres.forEach(s => s.classList.remove('active-sphere-right'));
            topSphere.classList.remove('active-sphere-top');
            topMist.style.opacity = '0';
            motes.forEach(m => m.el.style.opacity = '0');
        }

        function startCycle() {
            const p = patterns[currentPattern];
            
            const runStep = (step) => {
                if (!isRunning) return;
                
                state = step;
                phaseStartTime = Date.now();
                const display = document.getElementById('breathing-state');

                if (step === 'inhale') {
                    display.innerText = "Inhale";
                    display.className = "font-headline-lg text-headline-lg text-error scale-110 transition-all duration-700"; // Red-ish for inhale mapping
                    phaseDuration = p.inhale;
                } else if (step === 'hold1') {
                    display.innerText = "Hold";
                    display.className = "font-headline-lg text-headline-lg text-purple-600 scale-100 transition-all duration-700";
                    phaseDuration = p.hold1;
                } else if (step === 'exhale') {
                    display.innerText = "Exhale";
                    display.className = "font-headline-lg text-headline-lg text-blue-500 scale-95 transition-all duration-700";
                    phaseDuration = p.exhale;
                } else if (step === 'hold2') {
                    display.innerText = "Hold";
                    display.className = "font-headline-lg text-headline-lg text-primary scale-100 transition-all duration-700";
                    phaseDuration = p.hold2;
                }

                if (phaseDuration === 0) {
                    nextStep(step);
                    return;
                }

                timer = setTimeout(() => nextStep(step), phaseDuration * 1000);
            };

            const nextStep = (current) => {
                if (current === 'inhale') runStep('hold1');
                else if (current === 'hold1') runStep('exhale');
                else if (current === 'exhale') runStep('hold2');
                else {
                    cycle++;
                    document.getElementById('cycle-count').innerText = cycle;
                    runStep('inhale');
                }
            };

            runStep('inhale');
        }

        // Initialize after slight delay to ensure layout is done for coordinates
        setTimeout(initMotes, 100);
        window.addEventListener('resize', initMotes); // Recalculate if resized
    </script>
</body></html>
